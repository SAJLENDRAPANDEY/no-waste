<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Waste Data</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            font-family: sans-serif;
        }

        .card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 420px;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1.75rem;
        }

        .icon-box {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #e8f5e9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .card-header h1 {
            font-size: 20px;
            font-weight: 500;
            color: #111;
            margin-bottom: 2px;
        }

        .card-header p {
            font-size: 13px;
            color: #777;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .field label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
        }

        .field input,
        .field select {
            width: 100%;
            padding: 9px 12px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fafafa;
            color: #111;
            outline: none;
            transition: border-color 0.2s;
        }

        .field input:focus,
        .field select:focus {
            border-color: #999;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 6px;
        }

        .btn-clear {
            flex: 1;
            padding: 10px;
            background: none;
            color: #555;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-clear:hover { background: #f5f5f5; }

        .btn-submit {
            flex: 2;
            padding: 10px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-submit:hover { opacity: 0.85; }
    </style>
</head>
<body>

<div class="card">

    <div class="card-header">
        <div class="icon-box">♻️</div>
        <div>
            <h1>Add Waste Data</h1>
            <p>Record new waste entry</p>
        </div>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">

            <div class="field">
                <label for="company">Company Name</label>
                <input type="text" id="company" name="company"
                       placeholder="Enter company name">
            </div>

            <div class="field">
                <label for="waste_type">Waste Type</label>
                <select id="waste_type" name="waste_type">
                    <option value="" disabled selected>Select waste type</option>
                    <option value="plastic">Plastic</option>
                    <option value="chemical">Chemical</option>
                    <option value="electronic">Electronic</option>
                    <option value="organic">Organic</option>
                    <option value="metal">Metal</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="field">
                <label for="quantity">Quantity (kg)</label>
                <input type="number" id="quantity" name="quantity"
                       placeholder="e.g. 250" min="0">
            </div>

            <div class="field">
                <label for="date">Date</label>
                <input type="date" id="date" name="date">
            </div>

            <div class="btn-row">
                <button type="reset" class="btn-clear">Clear</button>
                <button type="submit" class="btn-submit">Add Waste Entry</button>
            </div>

        </div>
    </form>

</div>

</body>
</html>
