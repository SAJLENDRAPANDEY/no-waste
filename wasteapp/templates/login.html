<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f5;
            font-family: sans-serif;
        }

        .card {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 380px;
        }

        .card h1 {
            font-size: 22px;
            font-weight: 500;
            color: #111;
            margin-bottom: 4px;
        }

        .card p.subtitle {
            font-size: 14px;
            color: #777;
            margin-bottom: 1.75rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .field label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 9px 12px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fafafa;
            color: #111;
            outline: none;
            transition: border-color 0.2s;
        }

        .field input:focus {
            border-color: #999;
        }

        .password-wrapper {
            position: relative;
        }

        .password-wrapper input {
            padding-right: 36px;
        }

        .toggle-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            color: #777;
            padding: 0;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 2px;
        }

        .remember input {
            width: 15px;
            height: 15px;
            cursor: pointer;
        }

        .remember label {
            font-size: 13px;
            color: #555;
            cursor: pointer;
        }

        .login-btn {
            margin-top: 6px;
            width: 100%;
            padding: 10px;
            background: #111;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .login-btn:hover {
            opacity: 0.85;
        }

        .register-link {
            font-size: 12px;
            color: #777;
            text-align: center;
            margin-top: 1.25rem;
        }

        .register-link a {
            color: #111;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Welcome back</h1>
        <p class="subtitle">Access your account</p>

        <form method="POST" action="">
            {% csrf_token %}

            <div class="form-group">
                <div class="field">
                    <label for="username">Username</label>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Enter username"
                        autocomplete="username"
                    >
                </div>

                <div class="field">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="••••••••"
                            autocomplete="current-password"
                        >
                        <button
                            type="button"
                            class="toggle-btn"
                            onclick="var i=document.getElementById('password'); i.type=i.type==='password'?'text':'password'; this.textContent=i.type==='password'?'👁':'🙈';"
                        >👁</button>
                    </div>
                </div>

                <div class="remember">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>

                <button type="submit" class="login-btn">Login</button>
            </div>
        </form>

        <p class="register-link">
    Don't have an account? <a href="{% url 'signup' %}">Register</a>
</p>
    </div>

</body>
</html>
