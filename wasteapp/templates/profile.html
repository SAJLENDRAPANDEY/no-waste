<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .profile-container { max-width: 600px; margin: 0 auto; }
        .profile-header { text-align: center; margin-bottom: 30px; }
        .profile-header img { width: 150px; height: 150px; border-radius: 50%; }
        .profile-info { background: #f5f5f5; padding: 20px; border-radius: 8px; }
        .info-row { margin: 10px 0; }
        .label { font-weight: bold; }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="profile-header">
            <img src="profile-pic.jpg" alt="Profile Picture">
            <h1>{{ user.name }}</h1>
            <p>{{ user.email }}</p>
        </div>
        <div class="profile-info">
            <div class="info-row">
                <span class="label">Username:</span> {{ user.username }}
            </div>
            <div class="info-row">
                <span class="label">Bio:</span> {{ user.bio }}
            </div>
            <div class="info-row">
                <span class="label">Joined:</span> {{ user.join_date }}
            </div>
        </div>
    </div>
</body>
</html>
