<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – Waste-Not</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      font-family: sans-serif;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.75rem;
    }

    .brand-icon {
      width: 36px; height: 36px;
      background: #3fb950;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 16px;
    }

    .card-header h1 { font-size: 20px; font-weight: 700; color: #e6edf3; margin-bottom: 2px; }
    .card-header p  { font-size: 13px; color: #7d8590; }

    /* ERROR BOX */
    .error-box {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 1rem;
      font-size: 13px;
      color: #f85149;
    }

    .form-group { display: flex; flex-direction: column; gap: 14px; }

    .field label {
      display: block;
      font-size: 12px;
      color: #7d8590;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .field input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid #30363d;
      border-radius: 8px;
      background: #0d1117;
      color: #e6edf3;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #3fb950; }

    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 36px; }

    .toggle-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: #7d8590;
      padding: 0;
    }

    /* ROLE SELECTOR */
    .role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .role-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border: 1px solid #30363d;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      background: #0d1117;
    }

    .role-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .role-option p       { margin: 0; }
    .role-option .name   { font-size: 13px; font-weight: 600; color: #e6edf3; }
    .role-option .desc   { font-size: 11px; color: #7d8590; }

    /* hide real radio */
    .role-option input[type="radio"] { display: none; }

    .role-option.active-producer {
      border-color: #3fb950;
      background: rgba(63,185,80,0.08);
    }

    .role-option.active-consumer {
      border-color: #58a6ff;
      background: rgba(88,166,255,0.08);
    }

    /* TERMS */
    .terms {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .terms input { width: 15px; height: 15px; accent-color: #3fb950; cursor: pointer; }
    .terms label { font-size: 13px; color: #7d8590; cursor: pointer; }
    .terms a { color: #3fb950; text-decoration: underline; }

    /* SUBMIT */
    .signup-btn {
      margin-top: 6px;
      width: 100%;
      padding: 11px;
      background: #3fb950;
      color: #0d1117;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.2s;
    }
    .signup-btn:hover { opacity: 0.85; }

    .login-link {
      font-size: 12px;
      color: #7d8590;
      text-align: center;
      margin-top: 1.25rem;
    }
    .login-link a { color: #3fb950; text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">

  <div class="card-header">
    <div class="brand-icon">♻️</div>
    <div>
      <h1>Create Account</h1>
      <p>Join the circular economy</p>
    </div>
  </div>

  {% if error %}
  <div class="error-box">{{ error }}</div>
  {% endif %}

  <form method="POST">
    {% csrf_token %}

    <div class="form-group">

      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" name="username"
               placeholder="Enter your username" autocomplete="username">
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email"
               placeholder="Enter your email" autocomplete="email">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password"
                 placeholder="••••••••" autocomplete="new-password">
          <button type="button" class="toggle-btn"
            onclick="var i=document.getElementById('password');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁':'🙈';">👁</button>
        </div>
      </div>

      <div class="field">
        <label for="confirm_password">Confirm Password</label>
        <div class="password-wrapper">
          <input type="password" id="confirm_password" name="confirm_password"
                 placeholder="••••••••" autocomplete="new-password">
          <button type="button" class="toggle-btn"
            onclick="var i=document.getElementById('confirm_password');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'👁':'🙈';">👁</button>
        </div>
      </div>

      <!-- ROLE SELECTOR -->
      <div class="field">
        <label>Select Role</label>
        <div class="role-grid">

          <label class="role-option" id="card-producer"
                 onclick="selectRole('producer')">
            <input type="radio" name="role" value="producer">
            <div class="role-icon" style="background:rgba(63,185,80,0.1);">🏭</div>
            <div>
              <p class="name">Producer</p>
              <p class="desc">Add waste</p>
            </div>
          </label>

          <label class="role-option" id="card-consumer"
                 onclick="selectRole('consumer')">
            <input type="radio" name="role" value="consumer">
            <div class="role-icon" style="background:rgba(88,166,255,0.1);">🛒</div>
            <div>
              <p class="name">Consumer</p>
              <p class="desc">Buy waste</p>
            </div>
          </label>

        </div>
      </div>

      <div class="terms">
        <input type="checkbox" id="terms" name="terms">
        <label for="terms">I agree to the <a href="#">Terms & Conditions</a></label>
      </div>

      <button type="submit" class="signup-btn">Create Account</button>

    </div>
  </form>

  <p class="login-link">
    Already have an account? <a href="{% url 'login' %}">Login</a>
  </p>

</div>

<script>
  function selectRole(role) {
    var p = document.getElementById('card-producer');
    var c = document.getElementById('card-consumer');

    p.classList.remove('active-producer');
    c.classList.remove('active-consumer');

    if (role === 'producer') {
      p.classList.add('active-producer');
      p.querySelector('input[type="radio"]').checked = true;
    } else {
      c.classList.add('active-consumer');
      c.querySelector('input[type="radio"]').checked = true;
    }
  }
</script>

</body>
</html>
